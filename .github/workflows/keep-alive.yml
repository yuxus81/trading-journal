# OPTIONAL: prevents the Supabase Free-tier 7-day inactivity pause with a light
# scheduled request. Safe to delete if you don't need it. Requires the same repo
# secrets as the deploy workflow (VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY).
name: Supabase keep-alive

on:
  schedule:
    - cron: '0 6 */5 * *' # roughly every 5 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Light REST request to keep the project active
        run: |
          curl -sS -o /dev/null -w "keep-alive status: %{http_code}\n" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/accounts?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
